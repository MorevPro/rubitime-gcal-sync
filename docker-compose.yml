services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - GOOGLE_SERVICE_ACCOUNT_JSON_FILE=/app/keys/${GOOGLE_SERVICE_ACCOUNT_JSON_FILE}
    volumes:
      - ./${GOOGLE_SERVICE_ACCOUNT_JSON_FILE}:/app/keys/${GOOGLE_SERVICE_ACCOUNT_JSON_FILE}:ro
    restart: unless-stopped